# Add queue workers for projects running on PHP 8.4
# Example — uncomment and adjust per project:

# [program:project2-worker]
# process_name=%(program_name)s_%(process_num)02d
# command=php /var/www/project_2/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
# autostart=true
# autorestart=true
# stopasgroup=true
# killasgroup=true
# user=www-data
# numprocs=2
# redirect_stderr=true
# stdout_logfile=/var/log/supervisor/project2-worker.log
# stopwaitsecs=3600
