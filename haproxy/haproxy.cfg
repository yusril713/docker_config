global
    log stdout format raw local0 info
    maxconn 50000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

#---------------------------------------------------------------------
# Stats UI — accessible at http://localhost:1936/stats
#---------------------------------------------------------------------
listen stats
    bind *:1936
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:secret
    stats show-legends
    stats show-node

#---------------------------------------------------------------------
# HTTP frontend — routes traffic to nginx by hostname
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    option forwardfor

    # Route by hostname
    acl host_project1 hdr(host) -i project1.test
    acl host_project2 hdr(host) -i project2.test
    acl host_undangan hdr(host) -i undangan.local
    acl patradata hdr(host) -i patradata.local
    acl nagara hdr(host) -i nagara.local

    use_backend project1_back if host_project1
    use_backend project2_back if host_project2
    use_backend nginx_default if host_undangan
    use_backend nginx_default if patradata
    use_backend nginx_default if nagara

    default_backend nginx_default

#---------------------------------------------------------------------
# Backends
#---------------------------------------------------------------------
backend nginx_default
    balance roundrobin
    server nginx nginx:80 check

backend project1_back
    balance roundrobin
    http-request set-header Host project1.test
    server nginx nginx:80 check

backend project2_back
    balance roundrobin
    http-request set-header Host project2.test
    server nginx nginx:80 check

backend undangan
    balance roundrobin
    http-request set-header Host undangan.local
    server nginx nginx:80 check

backend patradata
    balance roundrobin
    http-request set-header Host patradata.local
    server nginx nginx:80 check

backend nagara
    balance roundrobin
    http-request set-header Host nagara.local
    server nginx nginx:80 check
